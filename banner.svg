<svg width="860" height="120" viewBox="0 0 860 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="120" fill="#0d1117"/>
  
  <!-- Border -->
  <rect x="1" y="1" width="858" height="118" fill="none" stroke="#30363d" stroke-width="1"/>
  
  <!-- Top-left corner accent -->
  <line x1="1" y1="1" x2="20" y2="1" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="1" y1="1" x2="1" y2="20" stroke="#58a6ff" stroke-width="1.5"/>
  <!-- Top-right corner accent -->
  <line x1="840" y1="1" x2="859" y2="1" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="859" y1="1" x2="859" y2="20" stroke="#58a6ff" stroke-width="1.5"/>
  <!-- Bottom-left corner accent -->
  <line x1="1" y1="100" x2="1" y2="119" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="1" y1="119" x2="20" y2="119" stroke="#58a6ff" stroke-width="1.5"/>
  <!-- Bottom-right corner accent -->
  <line x1="859" y1="100" x2="859" y2="119" stroke="#58a6ff" stroke-width="1.5"/>
  <line x1="840" y1="119" x2="859" y2="119" stroke="#58a6ff" stroke-width="1.5"/>

  <!-- Prompt prefix -->
  <text x="28" y="42" font-family="'Courier New', Courier, monospace" font-size="13" fill="#3fb950">s3bc40@github</text>
  <text x="148" y="42" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8b949e">:~$</text>

  <!-- Main name -->
  <text x="28" y="72" font-family="'Courier New', Courier, monospace" font-size="22" font-weight="bold" fill="#e6edf3">Sébastien Claro</text>
  <text x="220" y="72" font-family="'Courier New', Courier, monospace" font-size="22" fill="#58a6ff"> / s3bc40</text>

  <!-- Tagline -->
  <text x="28" y="98" font-family="'Courier New', Courier, monospace" font-size="12" fill="#8b949e">AI-orchestrated dev · Python · Rust · TypeScript · Freelance open · CDI open · Les Landes, FR</text>

  <!-- Blinking cursor -->
  <rect x="416" y="56" width="11" height="20" fill="#58a6ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
