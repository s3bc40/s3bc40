<svg viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>GitHub banner — Sébastien G.CLARO / s3bc40</title>
  <style>
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .prompt { animation: fadeIn 0.4s ease forwards; animation-delay: 0.2s; opacity: 0; }
    .name { animation: slideIn 0.5s ease forwards; animation-delay: 0.7s; opacity: 0; }
    .headline { animation: fadeIn 0.5s ease forwards; animation-delay: 1.3s; opacity: 0; }
    .tag1 { animation: fadeIn 0.3s ease forwards; animation-delay: 1.7s; opacity: 0; }
    .tag2 { animation: fadeIn 0.3s ease forwards; animation-delay: 1.95s; opacity: 0; }
    .tag3 { animation: fadeIn 0.3s ease forwards; animation-delay: 2.2s; opacity: 0; }
    .tag4 { animation: fadeIn 0.3s ease forwards; animation-delay: 2.45s; opacity: 0; }
    .tag5 { animation: fadeIn 0.3s ease forwards; animation-delay: 2.7s; opacity: 0; }
    .cursor { animation: blink 1s step-end infinite; animation-delay: 1.2s; opacity: 0; }
    .link { animation: fadeIn 0.4s ease forwards; animation-delay: 3s; opacity: 0; }
    .bracket { animation: fadeIn 0.6s ease forwards; opacity: 0; }
    .bracket-tl { animation-delay: 0s; }
    .bracket-tr { animation-delay: 0.1s; }
    .bracket-bl { animation-delay: 0.1s; }
    .bracket-br { animation-delay: 0s; }
  </style>

  <rect width="860" height="180" fill="#0d1017"/>

  <rect x="44" y="28" width="2" height="124" fill="#e6b450" opacity="0.5"/>

  <polyline class="bracket bracket-tl" points="14,28 14,14 28,14" fill="none" stroke="#ff8f40" stroke-width="1.8" stroke-linecap="square"/>
  <polyline class="bracket bracket-tr" points="832,14 846,14 846,28" fill="none" stroke="#ff8f40" stroke-width="1.8" stroke-linecap="square"/>
  <polyline class="bracket bracket-bl" points="14,152 14,166 28,166" fill="none" stroke="#ff8f40" stroke-width="1.8" stroke-linecap="square"/>
  <polyline class="bracket bracket-br" points="832,166 846,166 846,152" fill="none" stroke="#ff8f40" stroke-width="1.8" stroke-linecap="square"/>

  <text class="prompt" x="62" y="52" font-family="JetBrains Mono, monospace" font-size="13" fill="#aad94c">s3bc40@github :~$</text>

  <g class="name">
    <text x="62" y="98" font-family="JetBrains Mono, monospace" font-size="34" font-weight="700" fill="#e6e1cf">Sébastien G.CLARO</text>
    <text x="432" y="98" font-family="JetBrains Mono, monospace" font-size="34" font-weight="700" fill="#e6b450"> / </text>
    <text x="474" y="98" font-family="JetBrains Mono, monospace" font-size="34" font-weight="700" fill="#e6e1cf">s3bc40</text>
  </g>

  <rect class="cursor" x="628" y="68" width="6" height="30" fill="#e6b450"/>

  <text class="headline" x="62" y="122" font-family="JetBrains Mono, monospace" font-size="12" fill="#626a73" letter-spacing="0.3">Full Stack Software Engineer · Developer Tools · Open Source · Les Landes, FR</text>

  <g class="tag1">
    <rect x="62" y="136" width="72" height="22" rx="3" fill="none" stroke="#59c2ff" stroke-width="1"/>
    <text x="98" y="151" font-family="JetBrains Mono, monospace" font-size="11" fill="#59c2ff" text-anchor="middle">Python</text>
  </g>
  <g class="tag2">
    <rect x="142" y="136" width="88" height="22" rx="3" fill="none" stroke="#95e6cb" stroke-width="1"/>
    <text x="186" y="151" font-family="JetBrains Mono, monospace" font-size="11" fill="#95e6cb" text-anchor="middle">TypeScript</text>
  </g>
  <g class="tag3">
    <rect x="238" y="136" width="58" height="22" rx="3" fill="none" stroke="#ff8f40" stroke-width="1"/>
    <text x="267" y="151" font-family="JetBrains Mono, monospace" font-size="11" fill="#ff8f40" text-anchor="middle">Rust</text>
  </g>
  <g class="tag4">
    <rect x="304" y="136" width="50" height="22" rx="3" fill="none" stroke="#e6b450" stroke-width="1"/>
    <text x="329" y="151" font-family="JetBrains Mono, monospace" font-size="11" fill="#e6b450" text-anchor="middle">AWS</text>
  </g>
  <g class="tag5">
    <rect x="362" y="136" width="44" height="22" rx="3" fill="none" stroke="#73b8ff" stroke-width="1"/>
    <text x="384" y="151" font-family="JetBrains Mono, monospace" font-size="11" fill="#73b8ff" text-anchor="middle">Go</text>
  </g>

  <text class="link" x="816" y="162" font-family="JetBrains Mono, monospace" font-size="11" fill="#aad94c" text-anchor="end">→ s3bc40.com</text>
</svg>
